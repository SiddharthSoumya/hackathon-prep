<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <span class="logo">📝 Notes App</span>
        <span class="subtitle">Your personal notes</span>
    </nav>

    <!-- MAIN CONTAINER -->
    <div class="container">

        <!-- CREATE NOTE FORM -->
        <div class="card">
            <h2>Create a Note</h2>
            <form id="noteForm">
                <div class="form-group">
                    <label for="title">Title *</label>
                    <input
                        type="text"
                        id="title"
                        placeholder="Enter note title..."
                        maxlength="100"
                        required
                    />
                </div>
                <div class="form-group">
                    <label for="content">Content *</label>
                    <textarea
                        id="content"
                        placeholder="Write your note..."
                        rows="4"
                        required
                    ></textarea>
                </div>
                <div class="form-group">
                    <label for="tag">Tag (optional)</label>
                    <input
                        type="text"
                        id="tag"
                        placeholder="e.g. study, work, personal"
                    />
                </div>
                <button type="submit" class="btn btn-primary">
                    Add Note
                </button>
            </form>
        </div>

        <!-- ERROR MESSAGE (hidden by default) -->
        <div class="error-box" id="errorBox" style="display:none;">
            ⚠️ <span id="errorText"></span>
        </div>

        <!-- NOTES LIST -->
        <div class="notes-section">
            <h2>All Notes <span class="count" id="noteCount">(0)</span></h2>
            <div class="notes-grid" id="notesGrid">
                <!-- notes render here via JS tomorrow -->
                <div class="empty-state">
                    No notes yet. Create your first one above! ☝️
                </div>
            </div>
        </div>

    </div>

</body>
</html>
